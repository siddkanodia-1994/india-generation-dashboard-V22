name: Backfill IEX Historical Data

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Market to backfill"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - dam
          - rtm
      start_date:
        description: "Start date (YYYY-MM-DD) — leave blank for 31 days ago"
        required: false
        default: ""
      end_date:
        description: "End date (YYYY-MM-DD) — leave blank for yesterday"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: playwright install chromium --with-deps

      - name: Run backfill
        run: |
          ARGS="--market ${{ github.event.inputs.market }}"
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="$ARGS --start-date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          echo "Running: python backfill_iex.py $ARGS"
          cd scripts && python backfill_iex.py $ARGS

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-debug-screenshots
          path: /tmp/iex_*.png
          if-no-files-found: ignore

      - name: Commit and push backfilled data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "auto: backfill IEX ${{ github.event.inputs.market }} (${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }})"
            git push
          fi
