name: Backfill IEX Historical Data (Parallel)

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      market:
        description: "Market to backfill"
        required: true
        default: "both"
        type: choice
        options: [both, rtm, dam]
      start_date:
        description: "Start date (YYYY-MM-DD) — default: 2022-04-01"
        required: false
        default: "2022-04-01"
      end_date:
        description: "End date (YYYY-MM-DD) — blank = yesterday"
        required: false
        default: ""
      skip_existing:
        description: "Skip dates already in CSV (auto-detect gaps only)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      force_solar:
        description: "RTM: overwrite solar/nonsolar for ALL dates (fixes wrong historical values)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

  # Automatic weekly run — fills any gaps without manual intervention
  # Runs every Sunday at 01:00 UTC (06:30 IST)
  schedule:
    - cron: "0 1 * * 0"

# ── Job 1: Generate chunk matrix ──────────────────────────────────────────────
jobs:
  generate-matrix:
    name: Detect missing date chunks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count:  ${{ steps.gen.outputs.count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Only needs stdlib — no heavy deps required for matrix generation
      - name: Resolve end date
        id: dates
        run: |
          END="${{ github.event.inputs.end_date }}"
          if [ -z "$END" ]; then
            END=$(python3 -c "from datetime import date, timedelta; print(date.today()-timedelta(1))")
          fi
          echo "end_date=$END" >> $GITHUB_OUTPUT

      - name: Generate matrix
        id: gen
        run: |
          SKIP_FLAG=""
          FORCE_SOLAR_FLAG=""

          INPUT_SKIP="${{ github.event.inputs.skip_existing }}"
          INPUT_FORCE="${{ github.event.inputs.force_solar }}"

          # force_solar=true implies we process all RTM chunks (no skip for RTM)
          if [ "$INPUT_FORCE" = "true" ]; then
            FORCE_SOLAR_FLAG="--force-solar"
            # Still skip DAM existing dates; force-solar handles RTM skip internally
            INPUT_SKIP="true"
          fi

          # Default to skip_existing=true for scheduled runs
          if [ "$INPUT_SKIP" = "true" ] || [ -z "$INPUT_SKIP" ]; then
            SKIP_FLAG="--skip-existing"
          fi

          MARKET="${{ github.event.inputs.market }}"
          if [ -z "$MARKET" ]; then MARKET="both"; fi

          START="${{ github.event.inputs.start_date }}"
          if [ -z "$START" ]; then START="2022-04-01"; fi

          # Run generator — writes "matrix=..." and "count=..." lines to stdout
          cd scripts && python generate_backfill_matrix.py \
            --market "$MARKET" \
            --start-date "$START" \
            --end-date "${{ steps.dates.outputs.end_date }}" \
            $SKIP_FLAG $FORCE_SOLAR_FLAG >> $GITHUB_OUTPUT

          echo "Matrix generation complete"

# ── Job 2: Parallel backfill chunks ───────────────────────────────────────────
  backfill-chunk:
    name: "Backfill ${{ matrix.market }} ${{ matrix.start }} → ${{ matrix.end }}"
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
      max-parallel: 10   # Run 10 chunks simultaneously
      fail-fast: false   # Let other chunks continue if one fails

    steps:
      # ── Skip sentinel items (no missing data case) ──────────────────────────
      - name: Check for sentinel
        if: matrix.market == 'none'
        run: |
          echo "No missing data detected — nothing to backfill."
          exit 0

      # ── Setup ───────────────────────────────────────────────────────────────
      - name: Checkout repository
        if: matrix.market != 'none'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: matrix.market != 'none'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        if: matrix.market != 'none'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        if: matrix.market != 'none'
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers (Chromium only)
        if: matrix.market != 'none'
        run: playwright install chromium --with-deps

      # ── Scrape ──────────────────────────────────────────────────────────────
      - name: Run backfill chunk
        if: matrix.market != 'none'
        run: |
          FORCE_FLAG=""
          if [ "${{ matrix.force_solar }}" = "true" ]; then
            FORCE_FLAG="--force-solar"
          fi
          cd scripts
          python backfill_iex.py \
            --market "${{ matrix.market }}" \
            --start-date "${{ matrix.start }}" \
            --end-date "${{ matrix.end }}" \
            $FORCE_FLAG

      # ── Debug artifacts ─────────────────────────────────────────────────────
      - name: Upload debug screenshots
        if: always() && matrix.market != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.market }}-${{ matrix.start }}
          path: /tmp/iex_*.png
          if-no-files-found: ignore

      # ── Commit with rebase retry (handles concurrent pushes from parallel jobs)
      - name: Commit and push chunk data
        if: matrix.market != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/

          if git diff --cached --quiet; then
            echo "No new data for chunk ${{ matrix.start }} → ${{ matrix.end }}"
            exit 0
          fi

          git commit -m "auto: backfill ${{ matrix.market }} ${{ matrix.start }} → ${{ matrix.end }}"

          # Retry push up to 5 times with exponential back-off + rebase
          # (other parallel jobs may have pushed between our checkout and push)
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push attempt $attempt failed — rebasing and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 10))
          done
