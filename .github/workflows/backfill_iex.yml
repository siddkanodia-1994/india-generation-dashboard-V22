name: Backfill IEX Historical Data (Parallel)

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Market to backfill"
        required: true
        default: "both"
        type: choice
        options: [both, rtm, dam]
      start_date:
        description: "Start date (YYYY-MM-DD) — default: 2022-04-01"
        required: false
        default: "2022-04-01"
      end_date:
        description: "End date (YYYY-MM-DD) — blank = yesterday"
        required: false
        default: ""
      skip_existing:
        description: "Skip chunks where all dates already have complete data"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

  # Weekly auto-run: fills any new gaps
  schedule:
    - cron: "0 1 * * 0"

jobs:
  generate-matrix:
    name: Detect missing date chunks
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count:  ${{ steps.gen.outputs.count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve end date
        id: dates
        run: |
          END="${{ github.event.inputs.end_date }}"
          if [ -z "$END" ]; then
            END=$(python3 -c "from datetime import date, timedelta; print(date.today()-timedelta(1))")
          fi
          echo "end_date=$END" >> $GITHUB_OUTPUT

      - name: Generate matrix
        id: gen
        run: |
          SKIP_FLAG=""
          INPUT_SKIP="${{ github.event.inputs.skip_existing }}"
          if [ "$INPUT_SKIP" = "true" ] || [ -z "$INPUT_SKIP" ]; then
            SKIP_FLAG="--skip-existing"
          fi

          MARKET="${{ github.event.inputs.market }}"
          if [ -z "$MARKET" ]; then MARKET="both"; fi

          START="${{ github.event.inputs.start_date }}"
          if [ -z "$START" ]; then START="2022-04-01"; fi

          cd scripts && python generate_backfill_matrix.py \
            --market "$MARKET" \
            --start-date "$START" \
            --end-date "${{ steps.dates.outputs.end_date }}" \
            $SKIP_FLAG >> $GITHUB_OUTPUT

  backfill-chunk:
    name: "Backfill ${{ matrix.market }} ${{ matrix.start }} → ${{ matrix.end }}"
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
      max-parallel: 10
      fail-fast: false

    steps:
      - name: Check for sentinel
        if: matrix.market == 'none'
        run: echo "No missing data — nothing to backfill." && exit 0

      - uses: actions/checkout@v4
        if: matrix.market != 'none'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: matrix.market != 'none'
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        if: matrix.market != 'none'
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        if: matrix.market != 'none'
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        if: matrix.market != 'none'
        run: playwright install chromium --with-deps

      - name: Run backfill chunk
        if: matrix.market != 'none'
        run: |
          cd scripts
          python backfill_iex.py \
            --market "${{ matrix.market }}" \
            --start-date "${{ matrix.start }}" \
            --end-date "${{ matrix.end }}"

      - name: Upload debug screenshots
        if: always() && matrix.market != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.market }}-${{ matrix.start }}
          path: /tmp/iex_*.png
          if-no-files-found: ignore

      - name: Commit and push chunk data
        if: matrix.market != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/

          if git diff --cached --quiet; then
            echo "No new data for chunk ${{ matrix.start }} → ${{ matrix.end }}"
            exit 0
          fi

          git commit -m "auto: backfill ${{ matrix.market }} ${{ matrix.start }} → ${{ matrix.end }}"

          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              break
            fi
            echo "Push attempt $attempt failed — rebasing..."
            git pull --rebase origin main
            sleep $((attempt * 10))
          done
