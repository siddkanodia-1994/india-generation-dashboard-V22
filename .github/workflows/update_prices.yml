name: Update Prices Data (RTM, DAM, Stocks)

on:
  schedule:
    # 12:30am IST = 7:00pm UTC (IEX RTM & DAM data available by midnight IST)
    - cron: "0 19 * * *"
  workflow_dispatch:   # Allow manual trigger for testing

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: playwright install chromium --with-deps

      - name: Run stocks scraper
        run: |
          cd scripts
          python scrape_stocks.py
        continue-on-error: false

      - name: Run DAM scraper
        run: |
          cd scripts
          python scrape_iex_dam.py
        continue-on-error: true   # Don't block if IEX is unavailable

      - name: Backfill RTM for yesterday + day-before (Export download)
        run: |
          YESTERDAY=$(python3 -c "from datetime import date, timedelta; print(date.today()-timedelta(1))")
          DAY_BEFORE=$(python3 -c "from datetime import date, timedelta; print(date.today()-timedelta(2))")
          cd scripts
          python backfill_iex.py \
            --market rtm \
            --start-date "$DAY_BEFORE" \
            --end-date "$YESTERDAY" \
            --force-solar
        continue-on-error: true

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iex-debug-screenshots
          path: /tmp/iex_*.png
          if-no-files-found: ignore

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: update prices data $(date -u +'%Y-%m-%d')"
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed — rebasing..."
              git pull --rebase origin main
              sleep $((attempt * 5))
            done
          fi
