name: Live Prices Update (Hourly - Today)

on:
  schedule:
    # Every hour at :00 UTC (≈ every hour IST, offset by 30 min)
    - cron: "0 * * * *"
  workflow_dispatch:   # Allow manual trigger for testing

jobs:
  live-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: playwright install chromium --with-deps

      - name: Run RTM live scraper (Today)
        run: |
          cd scripts
          python scrape_iex_rtm.py --period today
        continue-on-error: true   # Don't block if IEX is temporarily unavailable

      - name: Run DAM live scraper (Today)
        run: |
          cd scripts
          python scrape_iex_dam.py --period today
        continue-on-error: true   # Don't block if IEX is temporarily unavailable

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iex-debug-screenshots
          path: /tmp/iex_*.png
          if-no-files-found: ignore

      - name: Commit and push live data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: live prices $(date -u +'%Y-%m-%dT%H:%M')Z"
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed — rebasing..."
              git pull --rebase origin main
              sleep $((attempt * 5))
            done
          fi
